<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- サイバーパンクなネオングラデーション -->
    <linearGradient id="cyber-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#b000ff" />
    </linearGradient>
    <!-- 発光エフェクト -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- ベース（漆黒の角丸正方形） -->
  <rect width="512" height="512" rx="112" fill="#0a0b10" />
  
  <!-- デジタル空間を思わせる薄いグリッドライン -->
  <path d="M 0 170 L 512 170 M 0 341 L 512 341 M 170 0 L 170 512 M 341 0 L 341 512" stroke="#161824" stroke-width="4" />

  <g filter="url(#glow)">
    <!-- 1. 開かれた本（幾何学的な重なり） -->
    <path d="M 120 400 L 256 320 L 392 400" fill="none" stroke="url(#cyber-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 96 300 L 256 180 L 416 300" fill="none" stroke="url(#cyber-grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 2. データストリーム（立ち上がる知識の柱） -->
    <path d="M 256 200 L 256 460" fill="none" stroke="url(#cyber-grad)" stroke-width="40" stroke-linecap="round" />
    
    <!-- 3. 論理とAIの象徴（頂点の六角形コア） -->
    <polygon points="256,50 300,75 300,125 256,150 212,125 212,75" fill="url(#cyber-grad)" />
    
    <!-- 4. 回路のノード（ネットワーク感） -->
    <circle cx="96" cy="300" r="16" fill="#00f3ff" />
    <circle cx="416" cy="300" r="16" fill="#b000ff" />
  </g>
</svg>